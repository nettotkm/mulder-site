<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fundo escuro -->
  <rect width="100" height="100" rx="18" fill="#0B1929"/>

  <!-- Prédio esquerdo -->
  <rect x="12" y="52" width="18" height="30" fill="#666B80"/>
  <rect x="15" y="56" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="22" y="56" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="15" y="64" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="22" y="64" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>

  <!-- Prédio central (alto) -->
  <rect x="33" y="22" width="22" height="60" fill="#4A658A"/>
  <rect x="36" y="28" width="4" height="5" fill="#FFFFFF" opacity="0.55"/>
  <rect x="45" y="28" width="4" height="5" fill="#FFFFFF" opacity="0.55"/>
  <rect x="36" y="38" width="4" height="5" fill="#FFFFFF" opacity="0.55"/>
  <rect x="45" y="38" width="4" height="5" fill="#FFFFFF" opacity="0.55"/>
  <rect x="36" y="48" width="4" height="5" fill="#FFFFFF" opacity="0.55"/>
  <rect x="45" y="48" width="4" height="5" fill="#FFFFFF" opacity="0.55"/>

  <!-- Prédio direito -->
  <rect x="58" y="38" width="18" height="44" fill="#8899AA"/>
  <rect x="61" y="43" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="68" y="43" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="61" y="52" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="68" y="52" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="61" y="61" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="68" y="61" width="4" height="4" fill="#FFFFFF" opacity="0.5"/>

  <!-- Linha base dourada -->
  <rect x="10" y="82" width="80" height="4" rx="2" fill="#C49759"/>

  <!-- Lupa (círculo) -->
  <circle cx="44" cy="44" r="17" fill="none" stroke="#FFFFFF" stroke-width="4"/>
  <!-- Cabo da lupa -->
  <line x1="57" y1="57" x2="72" y2="72" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
</svg>
