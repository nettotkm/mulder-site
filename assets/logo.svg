<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 170" width="440" height="170">
  <defs>

    <!-- Aro externo: cromo com brilho -->
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C8D8E8"/>
      <stop offset="18%"  stop-color="#F0F5FA"/>
      <stop offset="38%"  stop-color="#8AAABB"/>
      <stop offset="55%"  stop-color="#E8EFF6"/>
      <stop offset="75%"  stop-color="#5A7A90"/>
      <stop offset="100%" stop-color="#2E4A60"/>
    </linearGradient>

    <!-- Borda interna do aro (mais escura) -->
    <linearGradient id="chromeInner" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A5870"/>
      <stop offset="40%"  stop-color="#7A9BB0"/>
      <stop offset="100%" stop-color="#B8CCE0"/>
    </linearGradient>

    <!-- Cristal da lupa -->
    <radialGradient id="glass" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#D8E8F4"/>
      <stop offset="60%"  stop-color="#B0C8E0"/>
      <stop offset="100%" stop-color="#8AAAC4"/>
    </radialGradient>

    <!-- Conector cromado -->
    <linearGradient id="connector" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#B0C4D4"/>
      <stop offset="35%"  stop-color="#E8F0F8"/>
      <stop offset="65%"  stop-color="#90AABC"/>
      <stop offset="100%" stop-color="#506070"/>
    </linearGradient>

    <!-- Cabo: borracha preta com reflexo -->
    <linearGradient id="grip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0D0D0D"/>
      <stop offset="30%"  stop-color="#2A2A2A"/>
      <stop offset="50%"  stop-color="#383838"/>
      <stop offset="70%"  stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>

    <!-- Reflexo brilhante no cabo -->
    <linearGradient id="gripShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Prédios: azul Mulder -->
    <linearGradient id="buildingGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0B1929"/>
      <stop offset="100%" stop-color="#162840"/>
    </linearGradient>

    <!-- Clip ao cristal -->
    <clipPath id="lensClip">
      <circle cx="78" cy="72" r="47"/>
    </clipPath>

    <!-- Sombra da lupa -->
    <filter id="lupaShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="4" dy="5" stdDeviation="5" flood-color="#0B1929" flood-opacity="0.3"/>
    </filter>

    <!-- Sombra do cabo -->
    <filter id="cableShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>

  </defs>

  <!-- ══════════════════════════════════════ -->
  <!--   LUPA                                -->
  <!-- ══════════════════════════════════════ -->
  <g filter="url(#lupaShadow)">

    <!-- Aro cromo externo (espessura + gradiente) -->
    <circle cx="78" cy="72" r="58" fill="url(#chrome)"/>

    <!-- Sombra interna do aro -->
    <circle cx="78" cy="72" r="52" fill="url(#chromeInner)"/>

    <!-- Segundo anel interno (separação visual entre aro e cristal) -->
    <circle cx="78" cy="72" r="49" fill="#3A5870"/>

    <!-- Cristal -->
    <circle cx="78" cy="72" r="47" fill="url(#glass)"/>

    <!-- ── Prédios ── -->
    <g clip-path="url(#lensClip)">

      <!-- Prédio ESQUERDO -->
      <rect x="28"  y="78"  width="20" height="42" fill="url(#buildingGrad)"/>
      <!-- janelas -->
      <rect x="31"  y="82"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="39"  y="82"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="31"  y="90"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="39"  y="90"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="31"  y="98"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="39"  y="98"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>

      <!-- Prédio CENTRAL (mais alto, topo reto) -->
      <rect x="54"  y="36"  width="28" height="84" fill="url(#buildingGrad)"/>
      <!-- janelas -->
      <rect x="57"  y="50"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="67"  y="50"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="60"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="67"  y="60"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="70"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="67"  y="70"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="80"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="67"  y="80"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="90"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="67"  y="90"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="100" width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="67"  y="100" width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>

      <!-- Prédio DIREITO -->
      <rect x="88"  y="60"  width="23" height="60" fill="url(#buildingGrad)"/>
      <!-- janelas -->
      <rect x="91"  y="65"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="99"  y="65"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="91"  y="74"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="99"  y="74"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="91"  y="83"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="99"  y="83"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="91"  y="92"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="99"  y="92"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="91"  y="101" width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="99"  y="101" width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>

      <!-- Linha dourada do chão -->
      <rect x="22" y="116" width="112" height="4" fill="#C49759"/>

      <!-- Reflexo do cristal (arco branco no topo-esquerdo) -->
      <ellipse cx="56" cy="46" rx="22" ry="10"
               fill="white" opacity="0.18"
               transform="rotate(-30 56 46)"/>
      <!-- segundo reflexo menor -->
      <ellipse cx="48" cy="54" rx="8" ry="4"
               fill="white" opacity="0.10"
               transform="rotate(-30 48 54)"/>
    </g>

    <!-- Aro cromo redesenhado por cima dos prédios (linhas de separação) -->
    <circle cx="78" cy="72" r="47" fill="none" stroke="#2A4060" stroke-width="2"/>
    <circle cx="78" cy="72" r="52" fill="none" stroke="#90AABC" stroke-width="0.8" opacity="0.6"/>

  </g>

  <!-- ══════════════════════════════════════ -->
  <!--   CABO                                -->
  <!-- ══════════════════════════════════════ -->
  <g filter="url(#cableShadow)">

    <!-- Conector cromado (pequeno trecho entre aro e cabo) -->
    <line x1="124" y1="120" x2="137" y2="133"
          stroke="url(#connector)" stroke-width="14" stroke-linecap="round"/>
    <!-- Detalhe: risco escuro na junção -->
    <line x1="130" y1="126" x2="133" y2="129"
          stroke="#2A4060" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Cabo principal (borracha preta) -->
    <line x1="135" y1="131" x2="168" y2="164"
          stroke="url(#grip)" stroke-width="20" stroke-linecap="round"/>

    <!-- Reflexo do cabo (brilho lateral) -->
    <line x1="136" y1="131" x2="168" y2="163"
          stroke="url(#gripShine)" stroke-width="7" stroke-linecap="round"/>

    <!-- Frisos do cabo (textura de borracha) -->
    <line x1="140" y1="136" x2="147" y2="143"
          stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.07"/>
    <line x1="146" y1="142" x2="153" y2="149"
          stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.07"/>
    <line x1="152" y1="148" x2="159" y2="155"
          stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.07"/>
    <line x1="158" y1="154" x2="165" y2="161"
          stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.07"/>

  </g>

  <!-- ══════════════════════════════════════ -->
  <!--   TEXTO                               -->
  <!-- ══════════════════════════════════════ -->

  <!-- Separador vertical sutil -->
  <line x1="190" y1="30" x2="190" y2="140"
        stroke="#0B1929" stroke-width="1.5" opacity="0.1"/>

  <!-- MULDER -->
  <text x="204" y="97"
        font-family="'Franklin Gothic Demi', 'Arial Black', Impact, sans-serif"
        font-size="62"
        font-weight="900"
        fill="#0B1929"
        letter-spacing="-1.5">MULDER</text>

  <!-- ENGENHARIA -->
  <text x="207" y="126"
        font-family="'Franklin Gothic Demi', 'Arial Narrow', Arial, sans-serif"
        font-size="15"
        fill="#C49759"
        letter-spacing="9.5"
        font-weight="700">ENGENHARIA</text>

</svg>
