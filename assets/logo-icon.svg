<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 155" width="140" height="155">
  <defs>
    <linearGradient id="chromeI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C8D8E8"/>
      <stop offset="18%"  stop-color="#F0F5FA"/>
      <stop offset="38%"  stop-color="#8AAABB"/>
      <stop offset="55%"  stop-color="#E8EFF6"/>
      <stop offset="75%"  stop-color="#5A7A90"/>
      <stop offset="100%" stop-color="#2E4A60"/>
    </linearGradient>
    <linearGradient id="chromeInnerI" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A5870"/>
      <stop offset="40%"  stop-color="#7A9BB0"/>
      <stop offset="100%" stop-color="#B8CCE0"/>
    </linearGradient>
    <radialGradient id="glassI" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#D8E8F4"/>
      <stop offset="60%"  stop-color="#B0C8E0"/>
      <stop offset="100%" stop-color="#8AAAC4"/>
    </radialGradient>
    <linearGradient id="connectorI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#B0C4D4"/>
      <stop offset="35%"  stop-color="#E8F0F8"/>
      <stop offset="65%"  stop-color="#90AABC"/>
      <stop offset="100%" stop-color="#506070"/>
    </linearGradient>
    <linearGradient id="gripI" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0D0D0D"/>
      <stop offset="40%"  stop-color="#333333"/>
      <stop offset="60%"  stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="buildingI" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0B1929"/>
      <stop offset="100%" stop-color="#162840"/>
    </linearGradient>
    <clipPath id="lensClipI">
      <circle cx="65" cy="60" r="47"/>
    </clipPath>
    <filter id="shadowI">
      <feDropShadow dx="4" dy="5" stdDeviation="5" flood-color="#0B1929" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#shadowI)">
    <circle cx="65" cy="60" r="58" fill="url(#chromeI)"/>
    <circle cx="65" cy="60" r="52" fill="url(#chromeInnerI)"/>
    <circle cx="65" cy="60" r="49" fill="#3A5870"/>
    <circle cx="65" cy="60" r="47" fill="url(#glassI)"/>

    <g clip-path="url(#lensClipI)">

      <!-- Prédio ESQUERDO — recuado para dentro do círculo -->
      <rect x="24"  y="68"  width="18" height="32" fill="url(#buildingI)"/>
      <rect x="27"  y="72"  width="5"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="34"  y="72"  width="5"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="27"  y="80"  width="5"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="34"  y="80"  width="5"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="27"  y="88"  width="5"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="34"  y="88"  width="5"  height="4"  fill="#B0C8E0" opacity="0.45"/>

      <!-- Prédio CENTRAL — topo reto -->
      <rect x="43"  y="28"  width="28" height="72" fill="url(#buildingI)"/>
      <!-- janelas col 1 -->
      <rect x="46"  y="40"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="46"  y="50"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="46"  y="60"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="46"  y="70"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="46"  y="80"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="46"  y="90"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <!-- janelas col 2 -->
      <rect x="57"  y="40"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="50"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="60"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="70"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="80"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="57"  y="90"  width="7"  height="5"  fill="#B0C8E0" opacity="0.45"/>

      <!-- Prédio DIREITO -->
      <rect x="76"  y="52"  width="22" height="48" fill="url(#buildingI)"/>
      <rect x="79"  y="57"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="87"  y="57"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="79"  y="66"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="87"  y="66"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="79"  y="75"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="87"  y="75"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="79"  y="84"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="87"  y="84"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="79"  y="93"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>
      <rect x="87"  y="93"  width="6"  height="4"  fill="#B0C8E0" opacity="0.45"/>

      <!-- Linha dourada do chão — mais visível -->
      <rect x="18" y="99" width="94" height="5" fill="#C49759"/>

      <!-- Reflexo no cristal -->
      <ellipse cx="44" cy="36" rx="20" ry="9" fill="white" opacity="0.18" transform="rotate(-30 44 36)"/>
    </g>

    <circle cx="65" cy="60" r="47" fill="none" stroke="#2A4060" stroke-width="2"/>
  </g>

  <!-- CABO -->
  <line x1="111" y1="108" x2="124" y2="121" stroke="url(#connectorI)" stroke-width="14" stroke-linecap="round"/>
  <line x1="122" y1="119" x2="135" y2="148" stroke="url(#gripI)" stroke-width="20" stroke-linecap="round"/>
  <line x1="123" y1="119" x2="135" y2="147" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.1"/>

</svg>
